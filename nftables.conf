#!/usr/sbin/nft -f
# =======================================================
# 📝 变量定义区 (务必根据实际情况修改)
# =======================================================
# --- 公共配置 ---
define RELAY_LAN_IP  = 10.120.128.125  # PO0内网 IP

# --- 线路 1 配置 (例如RFC HK T1) ---
define PORT_IN_1     = 11086       # 中转端口 1
define DEST_IP_1     = 172.71.104.171  # 1号落地机 IP
define DEST_PORT_1   = 9584       # 1号落地机端口

# --- 线路 2 配置 (例如RFC JP CO) ---
define PORT_IN_2     = 25086       # 中转端口 2
define DEST_IP_2     = 23.229.16.233   # 2号落地机 IP 
define DEST_PORT_2   = 9599         # 2号落地机端口

# --- 线路 3 配置 (例如RFC JP CO) ---
define PORT_IN_3     = 30686       # 中转端口 3
define DEST_IP_3     = 82.40.25.108   # 3号落地机 IP 
define DEST_PORT_3   = 9699         # 2号落地机端口

# ---线路 4 配置（NANO USA）---
define PORT_IN_4     = 58086       # 中转端口 4 
define DEST_IP_4     = 10.77.189.234  # 4号落地机 IP  
define DEST_PORT_4   = 9799         # 4号落地机端口 

# ---线路 5 配置（LARGE USA）---
define PORT_IN_5     = 60886       # 中转端口 5 
define DEST_IP_5     = 10.87.18.138  # 5号落地机 IP  
define DEST_PORT_5   = 9899         # 5号落地机端口 
#=======================================================
# 清空旧规则
flush ruleset

# --- 核心转发逻辑 (NAT表) ---
table ip nat {
    # --- 入站转发 (DNAT) ---
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        
        # [线路 1] 流量进入端口1 -> 转给落地机1
        meta l4proto { tcp, udp } th dport $PORT_IN_1 dnat to $DEST_IP_1:$DEST_PORT_1
        
        # [线路 2] 流量进入端口2 -> 转给落地机2
        meta l4proto { tcp, udp } th dport $PORT_IN_2 dnat to $DEST_IP_2:$DEST_PORT_2

        # [线路 3] 流量进入端口3 -> 转给落地机3
        meta l4proto { tcp, udp } th dport $PORT_IN_3 dnat to $DEST_IP_3:$DEST_PORT_3

        # [线路 4] 流量进入端口4 -> 转给落地机4
        meta l4proto { tcp, udp } th dport $PORT_IN_4 dnat to $DEST_IP_4:$DEST_PORT_4

        # [线路 5] 流量进入端口5 -> 转给落地机5
        meta l4proto { tcp, udp } th dport $PORT_IN_5 dnat to $DEST_IP_5:$DEST_PORT_5
    }

    # --- 出站伪装 (SNAT) ---
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        
        # [线路 1] 发往落地机1的流量 -> 改源IP为内网IP (走专线)
        ip daddr $DEST_IP_1 meta l4proto { tcp, udp } th dport $DEST_PORT_1 snat to $RELAY_LAN_IP
        
        # [线路 2] 发往落地机2的流量 -> 改源IP为内网IP (走专线)
        ip daddr $DEST_IP_2 meta l4proto { tcp, udp } th dport $DEST_PORT_2 snat to $RELAY_LAN_IP
        
        # [线路 3] 发往落地机3的流量 -> 改源IP为内网IP (走专线)
        ip daddr $DEST_IP_3 meta l4proto { tcp, udp } th dport $DEST_PORT_3 snat to $RELAY_LAN_IP

        # [线路 4] 发往落地机4的流量 -> 改源IP为内网IP (走专线) 
        ip daddr $DEST_IP_4 meta l4proto { tcp, udp } th dport $DEST_PORT_4 snat to $RELAY_LAN_IP

        # [线路 5] 发往落地机4的流量 -> 改源IP为内网IP (走专线) 
        ip daddr $DEST_IP_5 meta l4proto { tcp, udp } th dport $DEST_PORT_5 snat to $RELAY_LAN_IP
    }
}

# --- 性能优化逻辑 (Filter表) ---
# 目的: 防止 MTU 不匹配导致的断流
table ip filter {
    chain forward {
        type filter hook forward priority 0; policy accept;
        
        # 调整 TCP MSS，解决某些情况下速度慢/断流”的问题
        ip daddr { $DEST_IP_1, $DEST_IP_2, $DEST_IP_3, $DEST_IP_4, $DEST_IP_5 } tcp flags syn tcp option maxseg size set 1452
    }
}
